name: AWS EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ 升级到 v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0  # ✅ 升级到最新版
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy application
        run: |
          set -x
          echo "Deploying to ${{ secrets.EC2_HOST }} as ${{ secrets.EC2_USER }}"
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            set -x
            echo '=== Remote Deployment Start ==='
            cd ~/chatbot_comp7940 || { echo '❌ CD failed'; exit 1; }
            git pull origin main || { echo '❌ Git pull failed'; exit 1; }
            pkill -f 'python chatbot.py' || echo 'ℹ️ No running process to kill'
            nohup ~/chatbot_comp7940/venv/bin/python chatbot.py > app.log 2>&1 &
            echo '✅ Deployment complete'
          "